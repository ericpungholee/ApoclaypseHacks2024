{% extends "layout.html" %}
{% block content %}
<script src="{{ url_for('static', filename='main.js') }}"></script>

<div class="control-layout">
    <div class="video-stream">
        <iframe src="{{ video_feed_url }}" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="control-panels">
        <div class="instruction-card">
            <span>W: Forward</span>
            <span>A: Left</span>
            <span>D: Right</span>
        </div>

        <div class="info-menu">
            <ul>
                <li>Coordinates: <span id="coordinates">{{ coordinate[0] }}, {{ coordinate[1] }}</span></li>
                <li>Power: <span id="power">{{ power }}</span></li>
                <li>Latitude: <span id="latitude">{{ latitude }}</span></li>
                <li>Longitude: <span id="longitude">{{ longitude }}</span></li>
            </ul>
        </div>
    </div>
</div>

<script>
    function updatePosition(position) {
        const latitude = position.coords.latitude;
        const longitude = position.coords.longitude;

        document.getElementById("coordinates").textContent = `${latitude}, ${longitude}`;
        document.getElementById("latitude").textContent = latitude;
        document.getElementById("longitude").textContent = longitude;
    }

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(updatePosition, console.warn, {
            enableHighAccuracy: true,
            timeout: 5000,
            maximumAge: 0,
        });
    }
</script>
{% endblock content %}
